name: OCI ARM Instance Retry

on:
  schedule:
    - cron: '0 18,19,20,21 * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI SDK
        run: pip install oci

      - name: Run launch script
        env:
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_SUBNET: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: python launch.py
