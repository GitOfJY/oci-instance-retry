name: OCI ARM Instance Retry

on:
  schedule:
    - cron: '0 18,19,20,21 * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
      SUPPRESS_LABEL_WARNING: "True"
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=ap-chuncheon-1\nkey_file=/home/runner/.oci/oci_api_key.pem\n' \
            "${{ secrets.OCI_USER_OCID }}" \
            "${{ secrets.OCI_FINGERPRINT }}" \
            "${{ secrets.OCI_TENANCY_OCID }}" > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Get Image OCID
        id: image
        run: |
          IMAGE_ID=$(oci compute image list --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" --operating-system "Canonical Ubuntu" --operating-system-version "22.04" --shape "VM.Standard.A1.Flex" --sort-by TIMECREATED --sort-order DESC --limit 1 --query 'data[0].id' --raw-output)
          echo "id=$IMAGE_ID" >> $GITHUB_OUTPUT

      - name: Build Launch JSON
        run: |
          SSH_KEY="$(echo -n '${{ secrets.OCI_SSH_PUBLIC_KEY }}' | tr -d '\n\r')"
          python3 -c "
          import json
          data = {
            'availabilityDomain': 'QIZn:AP-CHUNCHEON-1-AD-1',
            'compartmentId': '${{ secrets.OCI_TENANCY_OCID }}',
            'displayName': 'shopai-server',
            'shape': 'VM.Standard.A1.Flex',
            'shapeConfig': {'ocpus': 4.0, 'memoryInGbs': 24.0},
            'sourceDetails': {
              'sourceType': 'image',
              'imageId': '${{ steps.image.outputs.id }}'
            },
            'createVnicDetails': {
              'subnetId': '${{ secrets.OCI_SUBNET_OCID }}',
              'assignPublicIp': True
            },
            'metadata': {
              'ssh_authorized_keys': '''${SSH_KEY}'''
            }
          }
          with open('/tmp/launch.json', 'w') as f:
            json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          "

      - name: Try Create Instance
        id: create
        run: |
          oci compute instance launch --from-json "file:///tmp/launch.json" 2>&1 | tee result.txt || true
          if grep -q "ocid1.instance" result.txt; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "--- Result ---"
            tail -5 result.txt
          fi

      - name: Notify Success
        if: steps.create.outputs.success == 'true'
        run: echo "Instance created! Check OCI console for public IP."
