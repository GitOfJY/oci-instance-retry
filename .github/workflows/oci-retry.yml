name: OCI ARM Instance Retry

on:
  schedule:
    - cron: '0 18,19,20,21 * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI SDK
        run: pip install oci

      - name: Try Create Instance
        id: create
        env:
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_SUBNET: ${{ secrets.OCI_SUBNET_OCID }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          python3 << 'PYEOF'
          import oci, os, sys, tempfile

          key_file = tempfile.NamedTemporaryFile(mode='w', suffix='.pem', delete=False)
          key_file.write(os.environ['OCI_KEY'])
          key_file.close()

          config = {
              "user": os.environ['OCI_USER'],
              "fingerprint": os.environ['OCI_FINGERPRINT'],
              "tenancy": os.environ['OCI_TENANCY'],
              "region": "ap-chuncheon-1",
              "key_file": key_file.name
          }

          compute = oci.core.ComputeClient(config)

          images = compute.list_images(
              compartment_id=os.environ['OCI_TENANCY'],
              operating_system="Canonical Ubuntu",
              operating_system_version="22.04",
              shape="VM.Standard.A1.Flex",
              sort_by="TIMECREATED",
              sort_order="DESC",
              limit=1
          ).data

          image_id = images[0].id
          print(f"Image: {image_id}")

          try:
              result = compute.launch_instance(
                  oci.core.models.LaunchInstanceDetails(
                      availability_domain="QIZn:AP-CHUNCHEON-1-AD-1",
                      compartment_id=os.environ['OCI_TENANCY'],
                      display_name="shopai-server",
                      shape="VM.Standard.A1.Flex",
                      shape_config=oci.core.models.LaunchInstanceShapeConfigDetails(
                          ocpus=4.0,
                          memory_in_gbs=24.0
                      ),
                      source_details=oci.core.models.InstanceSourceViaImageDetails(
                          image_id=image_id
                      ),
                      create_vnic_details=oci.core.models.CreateVnicDetails(
                          subnet_id=os.environ['OCI_SUBNET'],
                          assign_public_ip=True
                      ),
                      metadata={
                          "ssh_authorized_keys": os.environ['OCI_SSH_KEY'].strip()
                      }
                  )
              )
              print(f"SUCCESS! Instance OCID: {result.data.id}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("success=true\n")
          except oci.exceptions.ServiceError as e:
              print(f"Failed: {e.code} - {e.message}")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("success=false\n")
          PYEOF

      - name: Notify Success
        if: steps.create.outputs.success == 'true'
        run: echo "Instance created! Check OCI console for public IP."
